
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>First Response: Dispatch Control - Prototype</title>
<style>
body { font-family: Arial; background:#222; color:white; text-align:center; }
#ui { margin:10px; }
button { margin:5px; padding:10px 16px; font-size:14px; }
canvas { background:#333; border:2px solid #555; }
</style>
</head>
<body>

<h2>First Response: Dispatch Control (Grey-box Prototype)</h2>
<p>Dispatch Police, Fire, or Paramedics to incidents. See if the core mechanic feels fun!</p>

<div id="ui">
<button onclick="dispatch('police')">Dispatch Police</button>
<button onclick="dispatch('fire')">Dispatch Firefighters</button>
<button onclick="dispatch('medic')">Dispatch Paramedics</button>
<span id="status">Waiting for incident...</span>
</div>

<canvas id="game" width="700" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let units = [];
let incidents = [];
let currentDispatch = null;

const station = {x:60, y:200};

function spawnIncident(){
    const types = ["police","fire","medic"];
    const type = types[Math.floor(Math.random()*types.length)];
    const incident = {
        x: Math.random()*550+120,
        y: Math.random()*340+30,
        type: type,
        resolved:false
    };
    incidents=[incident];
    document.getElementById("status").innerText="Incident: "+type.toUpperCase();
}

function dispatch(type){
    if(incidents.length===0) return;
    units.push({
        x:station.x,
        y:station.y,
        type:type,
        target:incidents[0],
        speed:1.5
    });
}

function update(){
    units.forEach(unit=>{
        const dx = unit.target.x-unit.x;
        const dy = unit.target.y-unit.y;
        const dist = Math.sqrt(dx*dx+dy*dy);

        if(dist>2){
            unit.x += dx/dist*unit.speed;
            unit.y += dy/dist*unit.speed;
        }else{
            if(unit.type===unit.target.type){
                unit.target.resolved=true;
                document.getElementById("status").innerText="Incident resolved!";
                setTimeout(spawnIncident,2000);
            }else{
                document.getElementById("status").innerText="Wrong unit dispatched!";
            }
        }
    });

    units = units.filter(u=>!u.target.resolved);
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // draw station
    ctx.fillStyle="white";
    ctx.fillRect(station.x-10,station.y-10,20,20);

    // draw incidents
    incidents.forEach(i=>{
        if(i.type==="police") ctx.fillStyle="blue";
        if(i.type==="fire") ctx.fillStyle="red";
        if(i.type==="medic") ctx.fillStyle="green";

        ctx.beginPath();
        ctx.arc(i.x,i.y,12,0,Math.PI*2);
        ctx.fill();
    });

    // draw units
    units.forEach(u=>{
        if(u.type==="police") ctx.fillStyle="blue";
        if(u.type==="fire") ctx.fillStyle="red";
        if(u.type==="medic") ctx.fillStyle="green";

        ctx.fillRect(u.x-6,u.y-6,12,12);
    });
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

spawnIncident();
loop();
</script>

</body>
</html>
